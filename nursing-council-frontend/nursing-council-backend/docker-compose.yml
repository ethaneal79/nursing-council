version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: msnc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       msnc_db
      POSTGRES_USER:     msnc_user
      POSTGRES_PASSWORD: msnc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msnc_user -d msnc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msnc_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/msnc_db
      DB_USERNAME:                msnc_user
      DB_PASSWORD:                msnc_password
      JWT_SECRET:                 change-me-in-production-256-bit-secret-key!!
      UPLOAD_DIR:                 /app/uploads
      MAIL_HOST:                  smtp.gmail.com
      MAIL_USERNAME:              no-reply@msnc.gov.in
      MAIL_PASSWORD:              ""
      APP_CORS_ALLOWED_ORIGINS:   http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  # ── React dev server (optional — remove in production) ───────────────────────
  frontend:
    image: node:20-alpine
    container_name: msnc_frontend
    working_dir: /app
    volumes:
      - ./nursing-council:/app
    command: sh -c "npm install && npm start"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
